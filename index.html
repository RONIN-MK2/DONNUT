<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Магазин пончиков</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            position: relative;
            background: #f9f3e6;
        }

        /* Заголовок — слева вверху */
        h1 {
            position: absolute;
            top: 30px;
            left: 40px;
            font-family: Arial, sans-serif;
            font-size: 36px;
            color: #8b4513;
        }

        /* Картинка — справа внизу */
        img {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Мир пончиков</h1>
    <img src="/uploads/2023/02/donut.png" alt="Пончик">
</body>
</html>
