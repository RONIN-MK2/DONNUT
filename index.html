<!DOCTYPE html>
<html lang='ru'>
<head>

    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Магазин пончиков</title>
    <style>
        body {

            min-height: 100vh;
            display: flex;
            justify-content: center;

            font-family: Arial, sans-serif;
        }

        .content {

            color: red;
            font-size: 36px;
            margin: 0 0 30px 0;

        img {

            display: block;
            margin: 0 auto;
        }

<body>
    <div class="content">
        <h1>Мир пончиков</h1>
        <img src="/uploads/2023/02/donut.png" alt="Пончик">
